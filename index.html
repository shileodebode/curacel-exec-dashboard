<!DOCTYPE html>
<html>
<head>
  <title>Curacel Executive Dashboard</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#020617;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:#111827;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:520px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:15px;
      font-size:38px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      font-size:18px;
    }

    a{
      display:inline-block;
      margin-top:25px;
      padding:14px 22px;
      background:#0ea5e9;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      font-size:16px;
    }

    a:hover{
      background:#0369a1;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Curacel AI Operations Dashboard</h1>

  <p>
    Executive dashboard for AI operations, workflow visibility,
    department adoption, risks and projections.
  </p>

  <a href="curacel-exec-dashboard.html">
    Open Dashboard
  </a>

</div>

</body>
</html>
